name: "Packaging Test"

on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  check_packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.14"
      - name: Run Packaging Test
        run: |
          uv build
          uv publish --dry-run
