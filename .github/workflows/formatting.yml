name: "Formatting"

on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  black:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: ["black", "isort"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --group formatting
      - name: ${{ matrix.tool }} Code Formatter
        run: uv run ${{ matrix.tool }} . --check
