name: "Coverage"

on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        if: github.actor != 'dependabot[bot]'
        with:
          token: ${{ secrets.XML_SUBMODULE_PAT }}
          # XML_SUBMODULE_PAT is a secret token on repository level with repo scope
          # https://github.com/Hochfrequenz/xml-fundamend-python/settings/secrets/actions/XML_AHB_MIG_Token
          submodules: "recursive"
      - uses: actions/checkout@v6
        if: github.actor == 'dependabot[bot]'
        # Dependabot PRs only bump pip dependencies and don't need the private submodule.
        # Tests that require the submodule will be skipped automatically (see conftest.py).
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Run Tests and Record Coverage
        run: |
          tox -e coverage
